<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odify — Lead Scraper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: #1e2a45;
      --border-hover: #2d3f62;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59,130,246,0.15);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      line-height: 1.5; -webkit-font-smoothing: antialiased;
    }

    /* ── Animations ── */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px rgba(59,130,246,0.1); } 50% { box-shadow: 0 0 40px rgba(59,130,246,0.25); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }

    /* ── Hero ── */
    .hero {
      position: relative; overflow: hidden;
      padding: 3rem 1.5rem 2rem; text-align: center;
      background: linear-gradient(180deg, rgba(59,130,246,0.08) 0%, transparent 100%);
    }
    @media (min-width: 640px) { .hero { padding: 4rem 2rem 2.5rem; } }
    .hero-glow {
      position: absolute; top: -50%; left: 50%; transform: translateX(-50%);
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.12), transparent 70%);
      pointer-events: none; animation: float 6s ease-in-out infinite;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
      padding: 0.3rem 0.8rem; border-radius: 999px;
      font-size: 0.75rem; color: #93c5fd; font-weight: 500; margin-bottom: 1rem;
      animation: fadeIn 0.6s ease;
    }
    .hero-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .hero h1 {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #f1f5f9, #3b82f6, #8b5cf6);
      background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: gradientShift 6s ease infinite; position: relative;
    }
    @media (min-width: 640px) { .hero h1 { font-size: 2.8rem; } }
    .hero p {
      color: var(--text2); font-size: 0.95rem; max-width: 480px;
      margin: 0.6rem auto 0; animation: fadeIn 0.6s ease 0.1s both;
    }
    @media (min-width: 640px) { .hero p { font-size: 1.05rem; } }

    .container { max-width: 900px; margin: 0 auto; padding: 0 1rem; width: 100%; }
    @media (min-width: 640px) { .container { padding: 0 1.5rem; } }

    /* ── Search Card ── */
    .search-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 1.25rem; margin: -1rem 1rem 1.5rem;
      position: relative; z-index: 10; animation: scaleIn 0.4s ease 0.2s both;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    @media (min-width: 640px) { .search-card { padding: 1.75rem; margin: -1.5rem 1.5rem 2rem; } }
    .search-card:focus-within { border-color: var(--accent); animation: glow 2s ease-in-out infinite; }

    .form-grid { display: flex; flex-direction: column; gap: 0.75rem; }
    @media (min-width: 640px) { .form-grid { display: grid; grid-template-columns: 1fr 1fr 100px; gap: 1rem; align-items: end; } }

    .form-group { position: relative; }
    .form-group label {
      display: block; font-size: 0.75rem; font-weight: 600; color: var(--text3);
      margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 0.7rem 0.85rem; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 0.95rem; font-family: inherit;
      outline: none; transition: all 0.25s ease; -webkit-appearance: none;
    }
    .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-group input::placeholder { color: var(--text3); }

    .btn {
      cursor: pointer; padding: 0.7rem 1.25rem; border-radius: var(--radius-sm);
      border: none; font-weight: 600; font-size: 0.9rem; font-family: inherit;
      -webkit-tap-highlight-color: transparent; transition: all 0.25s ease;
      position: relative; overflow: hidden; display: inline-flex;
      align-items: center; justify-content: center; gap: 0.4rem; min-height: 44px;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: #fff; width: 100%;
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(59,130,246,0.35); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      flex: 1;
    }
    .btn-secondary:hover { border-color: var(--border-hover); background: #1e2d4a; transform: translateY(-1px); }
    .btn-secondary svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Spinner ── */
    .spinner-wrap { display: none; margin-top: 0.75rem; }
    .spinner-wrap.active { display: flex; align-items: center; gap: 0.75rem; animation: slideDown 0.3s ease; }
    .progress-bar {
      flex: 1; height: 4px; background: var(--border); border-radius: 999px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 30%; background: linear-gradient(90deg, var(--accent), #8b5cf6);
      border-radius: 999px; animation: shimmer 1.5s linear infinite;
      background-size: 200% 100%;
    }
    .spinner-label { font-size: 0.8rem; color: var(--text3); white-space: nowrap; }

    /* ── Stats Bar ── */
    .stats-bar {
      display: none; align-items: center; gap: 1.5rem;
      padding: 0.75rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      margin: 0 1rem 1rem; animation: fadeIn 0.4s ease;
    }
    @media (min-width: 640px) { .stats-bar { margin: 0 1.5rem 1rem; padding: 0.75rem 1.25rem; } }
    .stats-bar.visible { display: flex; }
    .stat { display: flex; align-items: center; gap: 0.5rem; }
    .stat-icon {
      width: 28px; height: 28px; border-radius: 6px; display: flex;
      align-items: center; justify-content: center; font-size: 0.75rem; flex-shrink: 0;
    }
    .stat-icon.url { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .stat-icon.email { background: rgba(59,130,246,0.12); color: #60a5fa; }
    .stat-icon.phone { background: rgba(34,197,94,0.12); color: var(--green); }
    .stat-value { font-size: 0.95rem; font-weight: 700; }
    .stat-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Results Area ── */
    .results-area { display: none; }
    .results-area.visible { display: block; }

    .toolbar {
      display: flex; flex-direction: column; gap: 0.5rem;
      padding: 0 1rem; margin-bottom: 0.75rem;
    }
    @media (min-width: 640px) { .toolbar { flex-direction: row; padding: 0 1.5rem; } }

    .results-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; margin: 0 1rem 1.5rem; overflow: hidden;
      animation: fadeIn 0.4s ease;
    }
    @media (min-width: 640px) { .results-card { margin: 0 1.5rem 2rem; } }

    /* ── Mobile Cards ── */
    .mobile-cards { display: block; }
    @media (min-width: 768px) { .mobile-cards { display: none; } }

    .result-item {
      padding: 1rem; border-bottom: 1px solid var(--border);
      animation: fadeInUp 0.4s ease forwards; opacity: 0;
    }
    .result-item:last-child { border-bottom: none; }
    .result-item-index {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--surface2); font-size: 0.7rem; font-weight: 700;
      color: var(--text3); margin-right: 0.5rem;
    }
    .result-item-url {
      font-size: 0.82rem; word-break: break-all; margin: 0.35rem 0 0.6rem;
    }
    .result-item-url a {
      color: #60a5fa; text-decoration: none; transition: color 0.2s;
    }
    .result-item-url a:hover { color: #93c5fd; }
    .result-item-section { margin-bottom: 0.4rem; }
    .result-item-section:last-child { margin-bottom: 0; }
    .result-item-section-label {
      font-size: 0.68rem; color: var(--text3); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;
    }

    /* ── Desktop Table ── */
    .desktop-table { display: none; }
    @media (min-width: 768px) {
      .desktop-table { display: table; width: 100%; border-collapse: collapse; }
      .desktop-table thead { position: sticky; top: 0; z-index: 5; }
      .desktop-table th {
        text-align: left; padding: 0.85rem 1rem; font-size: 0.7rem;
        font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em;
        background: var(--surface); border-bottom: 1px solid var(--border);
      }
      .desktop-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
      .desktop-table tr { animation: fadeIn 0.3s ease forwards; opacity: 0; }
      .desktop-table tbody tr:hover td { background: rgba(59,130,246,0.03); }
      .desktop-table td.url-cell { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .desktop-table td.url-cell a { color: #60a5fa; text-decoration: none; }
      .desktop-table td.url-cell a:hover { color: #93c5fd; }
    }

    /* ── Badges ── */
    .badge-row { display: flex; flex-wrap: wrap; gap: 0.3rem; align-items: center; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.25rem;
      padding: 0.2rem 0.45rem; border-radius: 4px; font-size: 0.75rem;
      transition: all 0.2s; line-height: 1.4;
    }
    .badge:hover { transform: translateY(-1px); }
    .badge-email { background: rgba(59,130,246,0.1); color: #93c5fd; }
    .badge-phone { background: rgba(34,197,94,0.1); color: #86efac; }
    .badge-none { color: var(--text3); font-size: 0.8rem; }

    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--text3);
      padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.62rem;
      cursor: pointer; font-family: inherit; font-weight: 500;
      transition: all 0.2s ease; line-height: 1.4;
    }
    .copy-btn:hover { border-color: var(--accent); color: #60a5fa; background: var(--accent-glow); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .copy-btn:active { transform: scale(0.92); }

    /* ── Toast ── */
    .toast-container {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 100;
      display: flex; flex-direction: column; gap: 0.5rem;
    }
    .toast {
      padding: 0.7rem 1rem; border-radius: var(--radius-sm);
      background: var(--surface2); border: 1px solid var(--border);
      font-size: 0.85rem; color: var(--text);
      animation: slideUp 0.35s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      display: flex; align-items: center; gap: 0.5rem;
    }
    .toast-icon { font-size: 1rem; }

    /* ── Footer ── */
    footer {
      margin-top: auto; text-align: center; padding: 1.5rem;
      color: var(--text3); font-size: 0.78rem; border-top: 1px solid var(--border);
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 3rem 1.5rem; color: var(--text3);
    }
    .empty-state-icon { font-size: 2rem; margin-bottom: 0.75rem; opacity: 0.5; }
    .empty-state-text { font-size: 0.9rem; }

    /* ── Row animations (desktop) — generated in JS now ── */
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-glow"></div>
    <div class="hero-badge">
      <span class="hero-badge-dot"></span>
      Lead generation tool
    </div>
    <h1>Odify</h1>
    <p>Search any niche in any country. Scrape emails &amp; phone numbers. Export as CSV or save directly to contacts.</p>
  </div>

  <div class="search-card">
    <form id="searchForm" class="form-grid">
      <div class="form-group">
        <label for="niche">Niche</label>
        <input type="text" id="niche" name="niche" placeholder="e.g. plumber" value="plumber" required>
      </div>
      <div class="form-group">
        <label for="country">Country</label>
        <input type="text" id="country" name="country" placeholder="e.g. USA" value="USA" required>
      </div>
      <div class="form-group">
        <label for="max_results">Results</label>
        <input type="number" id="max_results" name="max_results" value="10" min="1" max="50">
      </div>
      <button type="submit" class="btn btn-primary" id="searchBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Search
      </button>
    </form>
    <div class="spinner-wrap" id="spinner">
      <div class="progress-bar"><div class="progress-bar-fill"></div></div>
      <span class="spinner-label">Scraping pages...</span>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-icon url">#</div><div><div class="stat-value" id="statUrls">0</div><div class="stat-label">URLs</div></div></div>
    <div class="stat"><div class="stat-icon email">@</div><div><div class="stat-value" id="statEmails">0</div><div class="stat-label">Emails</div></div></div>
    <div class="stat"><div class="stat-icon phone">T</div><div><div class="stat-value" id="statPhones">0</div><div class="stat-label">Phones</div></div></div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="toolbar">
      <button class="btn btn-secondary" id="downloadCsvBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download CSV
      </button>
      <button class="btn btn-secondary" id="downloadVcardsBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Download All vCards
      </button>
    </div>

    <div class="results-card">
      <div class="mobile-cards" id="mobileResults"></div>
      <table class="desktop-table">
        <thead><tr><th>#</th><th>URL</th><th>Emails</th><th>Phones</th></tr></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <footer>Odify &mdash; Open-source lead generation for freelancers</footer>

  <script>
    let currentSessionId = null;

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function toast(msg) {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div'); t.className = 'toast';
      t.innerHTML = `<span class="toast-icon">✓</span> ${escapeHtml(msg)}`;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function updateStats(results) {
      let urls = results.length, emails = 0, phones = 0;
      results.forEach(r => { emails += r.emails.length; phones += r.phones.length; });
      document.getElementById('statUrls').textContent = urls;
      document.getElementById('statEmails').textContent = emails;
      document.getElementById('statPhones').textContent = phones;
      document.getElementById('statsBar').classList.add('visible');
    }

    function buildCopyBtn(val) {
      return `<button class="copy-btn" data-copy="${escapeHtml(val)}">copy</button>`;
    }

    function renderResults(results) {
      const tbody = document.getElementById('resultsBody');
      const mobile = document.getElementById('mobileResults');
      tbody.innerHTML = ''; mobile.innerHTML = '';
      document.getElementById('resultsArea').classList.add('visible');

      if (!results.length) {
        const msg = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No results found. Try a different niche or country.</div></div>';
        tbody.innerHTML = `<tr><td colspan="4">${msg}</td></tr>`;
        mobile.innerHTML = msg;
        return;
      }

      updateStats(results);

      results.forEach((r, i) => {
        const eHtml = r.emails.length
          ? r.emails.map(e => `<span class="badge badge-email">${escapeHtml(e)}${buildCopyBtn(e)}</span>`).join(' ')
          : '<span class="badge-none">&mdash;</span>';
        const pHtml = r.phones.length
          ? r.phones.map(p => `<span class="badge badge-phone">${escapeHtml(p)}${buildCopyBtn(p)}</span>`).join(' ')
          : '<span class="badge-none">&mdash;</span>';

        // desktop
        const tr = document.createElement('tr');
        tr.style.animationDelay = `${i * 0.05}s`;
        tr.innerHTML = `<td style="color:var(--text3);font-size:0.8rem;">${i+1}</td>
          <td class="url-cell"><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)}</a></td>
          <td><div class="badge-row">${eHtml}</div></td>
          <td><div class="badge-row">${pHtml}</div></td>`;
        tbody.appendChild(tr);

        // mobile
        const card = document.createElement('div');
        card.className = 'result-item';
        card.style.animationDelay = `${i * 0.06}s`;
        card.innerHTML = `<div><span class="result-item-index">${i+1}</span><span style="font-size:0.75rem;color:var(--text3);">Lead</span></div>
          <div class="result-item-url"><a href="${escapeHtml(r.url)}" target="_blank" rel="noopener">${escapeHtml(r.url)}</a></div>
          <div class="result-item-section"><div class="result-item-section-label">Emails</div><div class="badge-row">${eHtml}</div></div>
          <div class="result-item-section"><div class="result-item-section-label">Phones</div><div class="badge-row">${pHtml}</div></div>`;
        mobile.appendChild(card);
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function () {
          const val = this.dataset.copy;
          navigator.clipboard.writeText(val).then(() => {
            this.textContent = 'copied!';
            this.classList.add('copied');
            setTimeout(() => { this.textContent = 'copy'; this.classList.remove('copied'); }, 1500);
          });
        });
      });
    }

    document.getElementById('searchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('searchBtn');
      const spinner = document.getElementById('spinner');
      const area = document.getElementById('resultsArea');
      area.classList.remove('visible');
      document.getElementById('statsBar').classList.remove('visible');
      btn.disabled = true;
      spinner.classList.add('active');

      try {
        const res = await fetch('/search', { method: 'POST', body: new FormData(e.target) });
        if (!res.ok) throw new Error(`Server error (${res.status})`);
        const data = await res.json();
        currentSessionId = data.session_id;
        if (!data.results.length) toast('No leads found — try different terms');
        else toast(`Found ${data.results.length} leads`);
        renderResults(data.results);
      } catch (err) {
        document.getElementById('resultsBody').innerHTML =
          `<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon">⚠</div><div class="empty-state-text">${escapeHtml(err.message)}</div></div></td></tr>`;
        document.getElementById('mobileResults').innerHTML =
          `<div class="empty-state"><div class="empty-state-icon">⚠</div><div class="empty-state-text">${escapeHtml(err.message)}</div></div>`;
        area.classList.add('visible');
      } finally {
        btn.disabled = false;
        spinner.classList.remove('active');
      }
    });

    document.getElementById('downloadCsvBtn').addEventListener('click', () => {
      if (currentSessionId) { window.location.href = `/download/csv/${currentSessionId}`; toast('Downloading CSV'); }
    });
    document.getElementById('downloadVcardsBtn').addEventListener('click', () => {
      if (currentSessionId) { window.location.href = `/download/all-vcards/${currentSessionId}`; toast('Downloading vCards'); }
    });
  </script>
</body>
</html>
